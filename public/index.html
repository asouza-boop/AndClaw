<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AndClaw PWA</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">A</div>
        <div>
          <div class="brand-title">AndClaw</div>
          <div class="brand-subtitle">Command Center</div>
        </div>
      </div>
      <nav class="nav">
        <button class="nav-item active" data-view="dashboard">Dashboard</button>
        <button class="nav-item" data-view="inbox">Inbox</button>
        <button class="nav-item" data-view="chat">Chat</button>
        <button class="nav-item" data-view="agenda">Agenda</button>
        <button class="nav-item" data-view="projects">Projetos</button>
        <button class="nav-item" data-view="meetings">Reuniões</button>
        <button class="nav-item" data-view="knowledge">Conhecimento</button>
        <button class="nav-item" data-view="archive">Arquivo</button>
        <button class="nav-item" data-view="admin">Admin</button>
      </nav>
      <div class="sidebar-footer">
        <div class="status-pill">Online</div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="search">
          <input type="text" placeholder="Buscar em tudo..." />
        </div>
        <div class="quick-actions">
          <button id="quick-capture-btn" class="btn primary">Quick Capture</button>
          <button id="new-task-btn" class="btn ghost">Nova Tarefa</button>
          <button id="new-meeting-btn" class="btn ghost">Nova Reunião</button>
          <button id="google-connect-btn" class="btn ghost">Conectar Google</button>
        </div>
      </header>

      <section id="view-dashboard" class="view active">
        <div class="grid">
          <div class="card">
            <h3>Hoje</h3>
            <div class="mini-list" id="today-list"></div>
          </div>
          <div class="card">
            <h3>Prioridades</h3>
            <div class="mini-list" id="priority-list"></div>
          </div>
          <div class="card">
            <h3>Inbox</h3>
            <div class="mini-list" id="inbox-list"></div>
          </div>
          <div class="card">
            <h3>Reuniões</h3>
            <div class="mini-list" id="meetings-list"></div>
          </div>
          <div class="card wide">
            <h3>Chat com o agente</h3>
            <div class="chat-window" id="chat-window"></div>
            <div class="chat-input">
              <input id="chat-input" type="text" placeholder="Digite uma mensagem" />
              <button id="chat-send" class="btn primary">Enviar</button>
            </div>
          </div>
        </div>
      </section>

      <section id="view-inbox" class="view">
        <h2>Inbox</h2>
        <div class="panel">
          <textarea id="capture-input" placeholder="Escreva um input rápido..."></textarea>
          <button id="capture-send" class="btn primary">Salvar</button>
        </div>
        <div class="list" id="captures-list"></div>
      </section>

      <section id="view-chat" class="view">
        <h2>Chat</h2>
        <div class="panel chat-panel">
          <div class="chat-window" id="chat-window-full"></div>
          <div class="chat-input">
            <input id="chat-input-full" type="text" placeholder="Digite uma mensagem" />
            <button id="chat-send-full" class="btn primary">Enviar</button>
          </div>
        </div>
      </section>

      <section id="view-agenda" class="view">
        <h2>Agenda</h2>
        <div class="panel">
          <div class="agenda-grid" id="agenda-grid"></div>
        </div>
      </section>

      <section id="view-projects" class="view">
        <h2>Projetos</h2>
        <div class="list" id="projects-list"></div>
      </section>

      <section id="view-meetings" class="view">
        <h2>Reuniões</h2>
        <div class="list" id="meetings-full-list"></div>
      </section>

      <section id="view-knowledge" class="view">
        <h2>Conhecimento</h2>
        <div class="list" id="memory-list"></div>
      </section>

      <section id="view-archive" class="view">
        <h2>Arquivo</h2>
        <div class="list" id="archive-list"></div>
      </section>

      <section id="view-admin" class="view">
        <h2>Admin</h2>
        <div class="grid">
          <div class="card">
            <h3>Banco</h3>
            <div class="mini-list" id="status-db"></div>
          </div>
          <div class="card">
            <h3>Google</h3>
            <div class="mini-list" id="status-google"></div>
          </div>
          <div class="card">
            <h3>GitVault</h3>
            <div class="mini-list" id="status-gitvault"></div>
          </div>
          <div class="card">
            <h3>Push</h3>
            <div class="mini-list" id="status-push"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <h3>Quick Capture</h3>
      <textarea id="modal-input" placeholder="Capture algo importante..."></textarea>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn ghost">Cancelar</button>
        <button id="modal-save" class="btn primary">Salvar</button>
      </div>
    </div>
  </div>

  <div id="login-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Entrar</h3>
      <input id="login-password" type="password" placeholder="Senha" />
      <input id="login-token-secret" type="password" placeholder="Token secret (apenas no primeiro setup)" />
      <div class="hint" id="bootstrap-hint">Se for o primeiro acesso, clique em Inicializar.</div>
      <div class="modal-actions">
        <button id="login-submit" class="btn primary">Entrar</button>
        <button id="login-bootstrap" class="btn ghost">Inicializar</button>
        <button id="login-generate" class="btn ghost">Gerar segredo</button>
      </div>
    </div>
  </div>

  <script src="/config.js"></script>
  <script src="/app.js"></script>
</body>
</html>
